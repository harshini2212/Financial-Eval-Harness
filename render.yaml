# Render Blueprint for the FULL app (live search + Claude runs + AI summaries).
# Deploy: push to GitHub -> render.com -> New + Blueprint -> pick this repo ->
# set ANTHROPIC_API_KEY when prompted. arelle needs memory, so use >=1GB (standard).
services:
  - type: web
    name: tieout
    runtime: python
    plan: standard            # 2 GB RAM — arelle + the us-gaap taxonomy need headroom
    buildCommand: pip install -r requirements.txt
    startCommand: python serve.py
    healthCheckPath: /api/health
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false           # set in the Render dashboard, never committed
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: TIEOUT_RUN_LIMIT
        value: "40"           # live runs per hour cap (0 = unlimited)
